{% extends 'Base.html' %}
{% load static %}
{% block main %}

<style>
  /* ===== Animated Gradient Background ===== */
  body {
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1a2a6c);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 50px 20px;
  }

  @keyframes gradientBG {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
  }

  /* ===== Form Container ===== */
  .inLoginForm {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    border-radius: 15px;
    padding: 30px 25px;
    width: 700px;
    max-width: 100%;
    box-shadow: 0 8px 30px rgba(0, 255, 136, 0.3);
    animation: fadeIn 1s ease forwards;
  }

  @keyframes fadeIn {
    0% {opacity: 0; transform: translateY(20px);}
    100% {opacity: 1; transform: translateY(0);}
  }

  .inLoginForm h2 {
    text-align: center;
    color: #00ff88;
    text-shadow: 0 0 10px #00ff88;
    margin-bottom: 25px;
    font-size: 2rem;
  }

  /* ===== Form Inputs ===== */
  .form-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .inputGroup {
    display: flex;
    flex-direction: column;
  }

  .inputGroup label {
    font-weight: 600;
    margin-bottom: 5px;
    color: #fff;
  }

  .inputGroup input {
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.2);
    color: #fff;
    transition: all 0.3s ease;
  }

  .inputGroup input:focus {
    background: rgba(255,255,255,0.3);
    box-shadow: 0 0 10px #00ff88;
  }

  /* ===== Radio Buttons ===== */
  .role-selection {
    display: flex;
    gap: 20px;
    margin-top: 15px;
  }

  .role-selection label {
    display: flex;
    align-items: center;
    cursor: pointer;
    color: #fff;
    font-weight: 600;
    gap: 8px;
  }

  .role-selection input[type="radio"] {
    accent-color: #00ff88;
    transform: scale(1.2);
  }

  /* ===== Button ===== */
  .submitForm {
    width: 100%;
    padding: 14px 0;
    margin-top: 25px;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    background: linear-gradient(90deg, #00ff88, #00b3ff, #ff6600);
    color: #000;
    transition: all 0.4s ease;
  }

  .submitForm:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #00ff88;
    background: linear-gradient(270deg, #ff6600, #00b3ff, #00ff88);
  }

  /* ===== Messages ===== */
  .messages {
    text-align: center;
    margin-bottom: 20px;
    color: #ff5555;
    font-weight: 600;
  }

  /* ===== Responsive ===== */
  @media (max-width: 768px) {
    .form-columns { grid-template-columns: 1fr; }
    .inLoginForm { padding: 20px; width: 95%; }
  }
</style>

<div class="inLoginForm">
  <h2>User Registration</h2>

  {% if messages %}
    <div class="messages">
      {% for message in messages %}
        <p>{{ message }}</p>
      {% endfor %}
    </div>
  {% endif %}

  <form action="" method="post">
    {% csrf_token %}
    <div class="form-columns">
      <div class="inputGroup">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Enter Name" required>
      </div>
      <div class="inputGroup">
        <label for="mobile">Mobile</label>
        <input type="tel" id="mobile" name="mobile" placeholder="Enter Mobile Number" required>
      </div>
      <div class="inputGroup">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter Email" required>
      </div>
      <div class="inputGroup">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter Username" required>
      </div>
      <div class="inputGroup">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter Password" required>
      </div>
      <div class="inputGroup">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="cnfm_password" placeholder="Confirm Password" required>
      </div>
    </div>

    <div class="role-selection">
      <label><input type="radio" name="role" value="admin" id="adminRadio"> Admin</label>
      <label><input type="radio" name="role" value="user" id="userRadio"> User</label>
    </div>

    <button class="submitForm">Register</button>
  </form>
</div>

{% endblock %}
